nameOverride:
fullnameOverride:
configMap:
  configFilePath: "configs/ollama-endpoint.yaml" #  "configs/azure-endpoint.yaml" If you want to use configuration file
  env:
    ## OPENAI SETTINGS START HERE
    # LLM_PROVIDER: openai_llm
    #LLM_OPENAI_API_BASE: https://api.openai.com/v1
    #GENERATION_MODEL: gpt-4o-mini

    #EMBEDDER_PROVIDER: openai_embedder
    #EMBEDDER_OPENAI_API_BASE: https://api.openai.com/v1
    ## OPENAI SETTINGS END


    ## OLLAMA SETTINGS START HERE
    LLM_PROVIDER: ollama_llm
    LLM_OLLAMA_API_BASE: http://ollama.hyperplane-ollama:11434/v1
    GENERATION_MODEL: qwen2.5:14b

    EMBEDDER_PROVIDER: ollama_embedder
    EMBEDDER_OLLAMA_URL: http://ollama.hyperplane-ollama:11434/v1
    EMBEDDING_MODEL: nomic-embed-text:latest
    ## OLLAMA SETTINGS END


    ## AZURE SETTINGS START HERE
    # AZURE_OPENAI_API_KEY: <API KEY REPLACE HERE>
    # LLM_AZURE_OPENAI_API_BASE: https://shakudo-api-key.openai.azure.com/
    # LLM_AZURE_OPENAI_VERSION: 2024-08-01-preview

    # EMBEDDER_AZURE_OPENAI_API_KEY: <API KEY REPLACE HERE>
    # EMBEDDER_AZURE_OPENAI_API_BASE: https://shakudo-api-key.openai.azure.com/
    # EMBEDDER_AZURE_OPENAI_VERSION: 2024-08-01-preview
    ## AZURE SETTINGS END


    EMBEDDER_TIMEOUT: 120


    QDRANT_HOST: qdrant.hyperplane-qdrant.svc.cluster.local
    DOCUMENT_STORE_PROVIDER: qdrant

    CONFIG_PATH: /app/config/config.yaml
wren:
  # Mandatory to set.
  openAiApiKey: "sk-pjShVJZV-ciACUsmwAsh4w"
  embedderOpenAiApiKey: "sk-xx"

  PG_URL: "postgres://wren:postgres@wrenai-local-llama-postgresql:5432/admin_ui"

podLabels: []

  # sidecar.istio.io/inject: "true"
  # Do not add sidecar, as it breaks the connection from frontend to engine service.

podAnnotations: {}

credentials:
  name: registry-credentials
  type: kubernetes.io/dockerconfigjson

application:
  api:
    replicas: 1
    image:
      repository: ghcr.io/canner/wren-ai-service
      tag: 0.14.3 # "semantics_description" error on runtime with 0.14.6
      pullPolicy: IfNotPresent
    ports:
      - name: api
        containerPort: 5555
        protocol: TCP
    containerName: api
    command: []
    args: []

  frontend:
    replicas: 1
    image:
      repository: ghcr.io/canner/wren-ui
      tag: 0.18.9 # latest stable version
      pullPolicy: IfNotPresent
    ports:
      - name: frontend
        containerPort: 3000
        protocol: TCP
    containerName: frontend
    command: []
    args: []

  engine:
    initContainers:
      - name: bootstrap
        image: ghcr.io/canner/wren-bootstrap:0.1.5 # latest stable version
        env:
          - name: DATA_PATH
            valueFrom:
              configMapKeyRef:
                name: wren-cm
                key: WREN_ENGINE_DATA_PATH
          - name: PG_PASSWORD
            valueFrom:
              secretKeyRef:
                name: wren-postgresql
                key: postgres-password
          - name: PG_USERNAME
            valueFrom:
              secretKeyRef:
                name: wren
                key: PG_USERNAME
        volumeMounts:
          - name: wren-data
            mountPath: /app/data
          ## If using config file
          - name: wren-ai-config
            mountPath: /app/config
        command: ["/bin/sh", "/app/init.sh"]
    replicas: 1
    image:
      repository: ghcr.io/canner/wren-engine
      tag: 0.13.2 # latest stable version
      pullPolicy: IfNotPresent
    ports:
      - name: engine
        containerPort: 8080
        protocol: TCP
      - name: engine-base
        containerPort: 7432
        protocol: TCP
    containerName: engine
    command: []
    args: []

  server:
    replicas: 1
    image:
      repository: ghcr.io/canner/wren-engine-ibis
      tag: 0.13.1 # 0.13.2 does not have duckdb installed so fail at run time importing it.
      pullPolicy: IfNotPresent
    ports:
      - name: server
        containerPort: 8000
        protocol: TCP
    containerName: server
    command: []
    args: []

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%

persistentVolumesClaims:
  - name: wren-data
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    # storageClassName: gp2

service:
  frontend:
    enabled: true
    name: frontend
    type: ClusterIP
    port: 3000
    targetPort: 3000

  engine:
    enabled: true
    name: engine
    type: ClusterIP
    port: 8080
    targetPort: 8080

  enginebase:
    enabled: true
    name: enginebase
    type: ClusterIP
    port: 7432
    targetPort: 7432

  server:
    enabled: true
    name: server
    type: ClusterIP
    port: 8000
    targetPort: 8000

  api:
    enabled: true
    name: api
    type: ClusterIP
    port: 5555
    targetPort: 5555

ingress:
  enabled: false

envFrom:
  - configMapRef:
      name: wren-cm
  - secretRef:
      name: wren

# Common Env vars to add to all deployments.
env: []

initContainers: []

volumes:
  - name: wren-data
    persistentVolumeClaim:
      claimName: wren-data
  # If use configuration file
  - name: wren-ai-config
    configMap:
      name: wren-ai-service-config

volumeMounts:
  - name: wren-data
    mountPath: /usr/src/app/etc
    readOnly: false
  # If use configuration file
  - name: wren-ai-config
    mountPath: /app/config

externalSecrets: []
# - name: bridge-env
#   gcp_secret_id: bridge_env
#   extract_key_value: false

serviceAccount:
  name: wren
  create: true
# annotations: {}
# #   iam.gke.io/gcp-service-account: app@gcp-project-id.iam.gserviceaccount.com

livenessProbe: {}
# httpGet:
#   scheme: HTTP
#   path: /
#   port: 80
# initialDelaySeconds: 5
# periodSeconds: 10
# timeoutSeconds: 1
# successThreshold: 1
# failureThreshold: 3

readinessProbe: {}
# httpGet:
#   scheme: HTTP
#   path: /
#   port: 80
# initialDelaySeconds: 5
# periodSeconds: 10
# timeoutSeconds: 1
# successThreshold: 1
# failureThreshold: 3

resources:
  frontend: {}
  api: {}
  engine: {}
  server: {}
#   limits:
#     memory: 800Mi
#   requests:
#     cpu: 500m
#     memory: 256Mi

postgresql:
  enabled: true
  auth:
    database: admin_ui
    username: wren
    password: wren
    secretKeys:
      adminPasswordKey: postgres-password
    existingSecret: wren-postgresql